---
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  annotations:
    openshift.io/display-name: peachpal-redteaming-storage
  namespace: {{ .Values.tenant.username }}-peachpal
  labels:
    opendatahub.io/dashboard: 'true'
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: kubeflow.org/v1
kind: Notebook
metadata:
  annotations:
    opendatahub.io/image-display-name: Code Server | Data Science | CPU | Python 3.12
    openshift.io/description: ''
    openshift.io/display-name: peachpal-redteaming
    notebooks.opendatahub.io/last-image-version-git-commit-selection: 06703a3
    notebooks.opendatahub.io/last-image-selection: 'code-server-notebook:2025.2'
    opendatahub.io/hardware-profile-namespace: redhat-ods-applications
    opendatahub.io/username: {{ .Values.tenant.username }}
    opendatahub.io/hardware-profile-name: default-profile
    opendatahub.io/connections: ''
    notebooks.opendatahub.io/inject-auth: 'true'
    opendatahub.io/workbench-image-namespace: ''
  name: peachpal-redteaming
  namespace: {{ .Values.tenant.username }}-peachpal
  finalizers:
    - notebook.opendatahub.io/httproute-cleanup
    - notebook.opendatahub.io/referencegrant-cleanup
    - notebook.opendatahub.io/kube-rbac-proxy-cleanup
  labels:
    app: peachpal-redteaming
    opendatahub.io/dashboard: 'true'
    opendatahub.io/odh-managed: 'true'
    opendatahub.io/user: {{ .Values.tenant.username }}
spec:
  template:
    spec:
      containers:
        - resources:
            limits:
              cpu: '2'
              memory: 4Gi
            requests:
              cpu: '2'
              memory: 4Gi
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /notebook/{{ .Values.tenant.username }}-peachpal/peachpal-redteaming/api
              port: notebook-port
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            successThreshold: 1
            timeoutSeconds: 1
          name: peachpal-redteaming
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /notebook/{{ .Values.tenant.username }}-peachpal/peachpal-redteaming/api
              port: notebook-port
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            successThreshold: 1
            timeoutSeconds: 1
          env:
            - name: NOTEBOOK_ARGS
              value: |-
                --ServerApp.port=8888
                                  --ServerApp.token=''
                                  --ServerApp.password=''
                                  --ServerApp.base_url=/notebook/{{ .Values.tenant.username }}-peachpal/peachpal-redteaming
                                  --ServerApp.quit_button=False
            - name: JUPYTER_IMAGE
              value: 'image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/code-server-notebook:2025.2'
            - name: REQUESTS_CA_BUNDLE
              value: /etc/pki/tls/custom-certs/ca-bundle.crt
            - name: SSL_CERT_FILE
              value: /etc/pki/tls/custom-certs/ca-bundle.crt
            - name: PIPELINES_SSL_SA_CERTS
              value: /etc/pki/tls/custom-certs/ca-bundle.crt
            - name: KF_PIPELINES_SSL_SA_CERTS
              value: /etc/pki/tls/custom-certs/ca-bundle.crt
            - name: GIT_SSL_CAINFO
              value: /etc/pki/tls/custom-certs/ca-bundle.crt
            - name: PIP_CERT
              value: /etc/pki/tls/custom-certs/ca-bundle.crt
          ports:
            - containerPort: 8888
              name: notebook-port
              protocol: TCP
          imagePullPolicy: Always
          volumeMounts:
            - mountPath: /opt/app-root/src/
              name: peachpal-redteaming-storage
            - mountPath: /dev/shm
              name: shm
            - mountPath: /etc/pki/tls/custom-certs/ca-bundle.crt
              name: trusted-ca
              readOnly: true
              subPath: ca-bundle.crt
            - mountPath: /opt/app-root/pipeline-runtimes/
              name: runtime-images
          image: 'image-registry.openshift-image-registry.svc:5000/redhat-ods-applications/code-server-notebook:2025.2'
          workingDir: /opt/app-root/src
        - resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /healthz
              port: 8444
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 5
            successThreshold: 1
            timeoutSeconds: 1
          name: kube-rbac-proxy
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /healthz
              port: 8444
              scheme: HTTPS
            initialDelaySeconds: 30
            periodSeconds: 5
            successThreshold: 1
            timeoutSeconds: 1
          ports:
            - containerPort: 8443
              name: kube-rbac-proxy
              protocol: TCP
          imagePullPolicy: Always
          volumeMounts:
            - mountPath: /etc/kube-rbac-proxy
              name: kube-rbac-proxy-config
            - mountPath: /etc/tls/private
              name: kube-rbac-proxy-tls-certificates
          image: 'registry.redhat.io/rhoai/odh-kube-auth-proxy-rhel9@sha256:4bff9c9b812872be081e64102cbacb711adfacd1862b5593e9809a6822720131'
          args:
            - '--secure-listen-address=0.0.0.0:8443'
            - '--upstream=http://127.0.0.1:8888/'
            - '--logtostderr=true'
            - '--v=10'
            - '--proxy-endpoints-port=8444'
            - '--config-file=/etc/kube-rbac-proxy/config-file.yaml'
            - '--tls-cert-file=/etc/tls/private/tls.crt'
            - '--tls-private-key-file=/etc/tls/private/tls.key'
            - '--auth-header-fields-enabled=true'
            - '--auth-header-user-field-name=X-Auth-Request-User'
            - '--auth-header-groups-field-name=X-Auth-Request-Groups'
      enableServiceLinks: false
      serviceAccountName: peachpal-redteaming
      volumes:
        - name: peachpal-redteaming-storage
          persistentVolumeClaim:
            claimName: peachpal-redteaming-storage
        - emptyDir:
            medium: Memory
          name: shm
        - configMap:
            items:
              - key: ca-bundle.crt
                path: ca-bundle.crt
            name: workbench-trusted-ca-bundle
            optional: true
          name: trusted-ca
        - configMap:
            name: pipeline-runtime-images
            optional: true
          name: runtime-images
        - configMap:
            defaultMode: 420
            name: peachpal-redteaming-kube-rbac-proxy-config
          name: kube-rbac-proxy-config
        - name: kube-rbac-proxy-tls-certificates
          secret:
            defaultMode: 420
            secretName: peachpal-redteaming-kube-rbac-proxy-tls
