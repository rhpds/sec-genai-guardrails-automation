---
apiVersion: v1
kind: ConfigMap
metadata:
  name: peachpal-config
  labels:
    app: peachpal
    app.kubernetes.io/name: peachpal
    app.kubernetes.io/component: config
data:
  LOG_LEVEL: "DEBUG"
  GUARDRAILS_ENABLED: "true"
  GUARDRAILS_ORCHESTRATOR_SERVICE_SERVICE_HOST: "guardrails-orchestrator-gateway"
  GUARDRAILS_ORCHESTRATOR_SERVICE_SERVICE_PORT_GATEWAY: "8090"
  VLLM_MODEL: "llama32-fp8"
  MAX_TOKENS: "200"
  TEMPERATURE: "0"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: peachpal-system-prompt
  labels:
    app: peachpal
    app.kubernetes.io/name: peachpal
    app.kubernetes.io/component: config
data:
  prompt: |
    You are a helpful assistant.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: peachpal
  labels:
    app: peachpal
    app.kubernetes.io/name: peachpal
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: peachpal
  template:
    metadata:
      labels:
        app: peachpal
        app.kubernetes.io/name: peachpal
    spec:
      containers:
        - name: peachpal
          image: quay.io/ckavili/lemon-fastapi:1.0.23
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
              name: http
          envFrom:
            - configMapRef:
                name: peachpal-config
          env:
            - name: VLLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: peachpal-secrets
                  key: vllm-api-key
          volumeMounts:
            - name: system-prompt
              mountPath: /system-prompt
              readOnly: true
          resources:
            limits:
              cpu: '2'
              memory: 2Gi
            requests:
              cpu: '1'
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
      volumes:
        - name: system-prompt
          configMap:
            name: peachpal-system-prompt
            items:
              - key: prompt
                path: prompt
---
apiVersion: v1
kind: Service
metadata:
  name: peachpal
  labels:
    app: peachpal
    app.kubernetes.io/name: peachpal
    app.kubernetes.io/component: frontend
spec:
  selector:
    app: peachpal
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: peachpal
  labels:
    app: peachpal
    app.kubernetes.io/name: peachpal
    app.kubernetes.io/component: frontend
  annotations:
    haproxy.router.openshift.io/balance: roundrobin
    haproxy.router.openshift.io/disable_cookies: 'true'
    haproxy.router.openshift.io/rate-limit-connections: 'false'
    haproxy.router.openshift.io/timeout: 300s
    haproxy.router.openshift.io/timeout-tunnel: 300s
spec:
  to:
    kind: Service
    name: peachpal
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
---
apiVersion: v1
kind: Secret
metadata:
  name: peachpal-secrets
  labels:
    app: peachpal
    app.kubernetes.io/name: peachpal
    app.kubernetes.io/component: config
type: Opaque
stringData:
  vllm-api-key: ""
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: peachpal
  labels:
    app: peachpal
    app.kubernetes.io/name: peachpal
    app.kubernetes.io/component: monitoring
spec:
  selector:
    matchLabels:
      app: peachpal
  endpoints:
    - port: http
      path: /metrics
      interval: 3s