# After TrustyAI is fully Ready, set the management-state annotation to
# Unmanaged on the TrustyAI CR. This stops rhods-operator from continuously
# reconciling the ConfigMap, allowing our image override to persist.
# The TrustyAI operator deployment stays running and processes CRs normally.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: trustyai-dsc-patcher
  namespace: redhat-ods-applications
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: trustyai-dsc-patcher
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
rules:
- apiGroups: ["components.platform.opendatahub.io"]
  resources: ["trustyais"]
  verbs: ["get", "list", "patch"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: trustyai-dsc-patcher
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
subjects:
- kind: ServiceAccount
  name: trustyai-dsc-patcher
  namespace: redhat-ods-applications
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: trustyai-dsc-patcher
---
apiVersion: batch/v1
kind: Job
metadata:
  name: trustyai-dsc-patcher
  namespace: redhat-ods-applications
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: trustyai-dsc-patcher
      restartPolicy: OnFailure
      containers:
      - name: patch
        image: registry.redhat.io/openshift4/ose-cli:latest
        command:
        - /bin/sh
        - -c
        - |
          set -e
          DESIRED="quay.io/ckavili/fms-guardrails-orchestrator:race-fix"

          echo "Step 1: Waiting for TrustyAI component to be Ready..."
          for i in $(seq 1 60); do
            PHASE=$(oc get trustyai default-trustyai \
              -o jsonpath='{.status.phase}' 2>/dev/null || echo "NotFound")
            if [ "$PHASE" = "Ready" ]; then
              echo "  TrustyAI is Ready."
              break
            fi
            echo "  Attempt $i/60 - phase: $PHASE - waiting 10s..."
            sleep 10
          done

          if [ "$PHASE" != "Ready" ]; then
            echo "ERROR: TrustyAI not Ready after 10 minutes."
            exit 1
          fi

          echo "Step 2: Setting TrustyAI CR annotation to Unmanaged..."
          oc patch trustyai default-trustyai --type=merge \
            -p '{"metadata":{"annotations":{"component.opendatahub.io/management-state":"Unmanaged"}}}'

          echo "Step 3: Waiting for operator to stop reconciling..."
          sleep 10

          echo "Step 4: Patching ConfigMap with desired image..."
          oc patch configmap trustyai-service-operator-config \
            -n redhat-ods-applications --type=merge \
            -p "{\"data\":{\"guardrails-orchestrator-image\":\"$DESIRED\"}}"

          FINAL=$(oc get configmap trustyai-service-operator-config \
            -n redhat-ods-applications \
            -o jsonpath='{.data.guardrails-orchestrator-image}')
          echo "Final image: $FINAL"

          if [ "$FINAL" = "$DESIRED" ]; then
            echo "SUCCESS"
          else
            echo "FAILED - image not set"
            exit 1
          fi
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 512Mi
