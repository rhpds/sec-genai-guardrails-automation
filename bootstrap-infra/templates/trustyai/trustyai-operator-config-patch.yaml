# Workaround: TrustyAI Guardrails Orchestrator image override
# Due to a race condition bug in the orchestrator (fix not yet landed downstream),
# we override the orchestrator image in the operator config.
#
# The TrustyAI operator continuously reconciles the ConfigMap via force SSA.
# We run a lightweight Deployment that loops every 30s, using the Kubernetes
# API with server-side apply (force=true, custom field manager) to re-patch
# the image whenever the operator reverts it.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: trustyai-config-patcher
  namespace: redhat-ods-applications
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: trustyai-config-patcher
  namespace: redhat-ods-applications
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "patch", "update", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: trustyai-config-patcher
  namespace: redhat-ods-applications
subjects:
- kind: ServiceAccount
  name: trustyai-config-patcher
  namespace: redhat-ods-applications
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: trustyai-config-patcher
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trustyai-config-patcher
  namespace: redhat-ods-applications
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trustyai-config-patcher
  template:
    metadata:
      labels:
        app: trustyai-config-patcher
    spec:
      serviceAccountName: trustyai-config-patcher
      containers:
      - name: patch
        image: registry.redhat.io/openshift4/ose-cli:latest
        command:
        - /bin/sh
        - -c
        - |
          DESIRED="quay.io/ckavili/fms-guardrails-orchestrator:race-fix"
          NS="redhat-ods-applications"
          CM="trustyai-service-operator-config"
          API="https://kubernetes.default.svc"
          CA=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          BODY="{\"apiVersion\":\"v1\",\"kind\":\"ConfigMap\",\"metadata\":{\"name\":\"$CM\",\"namespace\":\"$NS\"},\"data\":{\"guardrails-orchestrator-image\":\"$DESIRED\"}}"

          echo "Starting TrustyAI config patcher loop..."
          while true; do
            TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
            CURRENT=$(curl -s --cacert $CA -H "Authorization: Bearer $TOKEN" \
              "$API/api/v1/namespaces/$NS/configmaps/$CM" | \
              python3 -c "import sys,json; print(json.load(sys.stdin).get('data',{}).get('guardrails-orchestrator-image',''))" 2>/dev/null)

            if [ "$CURRENT" != "$DESIRED" ]; then
              echo "$(date): Patching image from $CURRENT"
              curl -s --cacert $CA -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/apply-patch+yaml" \
                -X PATCH \
                "$API/api/v1/namespaces/$NS/configmaps/$CM?fieldManager=guardrails-patcher&force=true" \
                -d "$BODY" > /dev/null
            fi
            sleep 30
          done
        resources:
          requests:
            cpu: 5m
            memory: 32Mi
          limits:
            cpu: 50m
            memory: 128Mi
