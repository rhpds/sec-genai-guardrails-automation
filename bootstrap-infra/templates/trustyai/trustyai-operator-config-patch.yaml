# Workaround: TrustyAI Guardrails Orchestrator image override
# Due to a race condition bug in the orchestrator (fix not yet landed downstream),
# we override the orchestrator image in the operator config.
#
# The TrustyAI operator continuously reconciles this ConfigMap and reverts changes,
# even with opendatahub.io/managed: "false". So we use an ArgoCD PostSync hook Job
# that patches the ConfigMap AFTER sync, ensuring our override is applied last.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: trustyai-config-patcher
  namespace: redhat-ods-applications
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: trustyai-config-patcher
  namespace: redhat-ods-applications
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  resourceNames: ["trustyai-service-operator-config"]
  verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: trustyai-config-patcher
  namespace: redhat-ods-applications
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
subjects:
- kind: ServiceAccount
  name: trustyai-config-patcher
  namespace: redhat-ods-applications
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: trustyai-config-patcher
---
apiVersion: batch/v1
kind: Job
metadata:
  name: trustyai-config-patch
  namespace: redhat-ods-applications
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: trustyai-config-patcher
      restartPolicy: OnFailure
      containers:
      - name: patch
        image: registry.redhat.io/openshift4/ose-cli:latest
        command:
        - /bin/sh
        - -c
        - |
          echo "Waiting 15s for operator reconciliation to complete..."
          sleep 15
          echo "Patching trustyai-service-operator-config..."
          oc patch configmap trustyai-service-operator-config \
            -n redhat-ods-applications \
            --type merge \
            -p '{"data":{"guardrails-orchestrator-image":"quay.io/ckavili/fms-guardrails-orchestrator:race-fix"}}'
          echo "Verifying patch..."
          oc get configmap trustyai-service-operator-config \
            -n redhat-ods-applications \
            -o jsonpath='{.data.guardrails-orchestrator-image}'
          echo ""
          echo "Done."
