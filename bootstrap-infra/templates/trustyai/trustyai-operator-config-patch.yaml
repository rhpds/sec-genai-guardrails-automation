# Workaround: TrustyAI Guardrails Orchestrator image override
# Due to a race condition bug in the orchestrator (fix not yet landed downstream),
# we override the orchestrator image in the operator config.
#
# The TrustyAI operator continuously reconciles the ConfigMap.
# We use a CronJob that re-patches the field every 2 minutes using
# oc patch --type=merge to ensure our override persists.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: trustyai-config-patcher
  namespace: redhat-ods-applications
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: trustyai-config-patcher
  namespace: redhat-ods-applications
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "patch", "update", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: trustyai-config-patcher
  namespace: redhat-ods-applications
subjects:
- kind: ServiceAccount
  name: trustyai-config-patcher
  namespace: redhat-ods-applications
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: trustyai-config-patcher
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: trustyai-config-patcher
  namespace: redhat-ods-applications
spec:
  schedule: "*/2 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  concurrencyPolicy: Replace
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          serviceAccountName: trustyai-config-patcher
          restartPolicy: Never
          containers:
          - name: patch
            image: registry.redhat.io/openshift4/ose-cli:latest
            command:
            - /bin/sh
            - -c
            - |
              DESIRED="quay.io/ckavili/fms-guardrails-orchestrator:race-fix"
              CURRENT=$(oc get configmap trustyai-service-operator-config \
                -n redhat-ods-applications \
                -o jsonpath='{.data.guardrails-orchestrator-image}' 2>/dev/null)

              if [ "$CURRENT" = "$DESIRED" ]; then
                echo "Image already set correctly. No action needed."
                exit 0
              fi

              echo "Current: $CURRENT"
              echo "Desired: $DESIRED"
              echo "Patching..."

              oc patch configmap trustyai-service-operator-config \
                -n redhat-ods-applications \
                --type=merge \
                -p "{\"data\":{\"guardrails-orchestrator-image\":\"$DESIRED\"}}"

              FINAL=$(oc get configmap trustyai-service-operator-config \
                -n redhat-ods-applications \
                -o jsonpath='{.data.guardrails-orchestrator-image}')
              echo "Final: $FINAL"
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                cpu: 100m
                memory: 512Mi
