# Workaround: TrustyAI Guardrails Orchestrator image override
# Due to a race condition bug in the orchestrator (fix not yet landed downstream),
# we override the orchestrator image in the operator config.
#
# The TrustyAI operator uses force Server-Side Apply to manage the ConfigMap.
# To win, we use a CronJob that continuously re-patches the field using
# kubectl apply --server-side --force-conflicts with our own field manager.
# This ensures our override persists even after operator reconciliation.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: trustyai-config-patcher
  namespace: redhat-ods-applications
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: trustyai-config-patcher
  namespace: redhat-ods-applications
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "patch", "update", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: trustyai-config-patcher
  namespace: redhat-ods-applications
subjects:
- kind: ServiceAccount
  name: trustyai-config-patcher
  namespace: redhat-ods-applications
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: trustyai-config-patcher
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: trustyai-config-patcher
  namespace: redhat-ods-applications
spec:
  schedule: "*/2 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  concurrencyPolicy: Replace
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          serviceAccountName: trustyai-config-patcher
          restartPolicy: Never
          containers:
          - name: patch
            image: registry.redhat.io/openshift4/ose-cli:latest
            command:
            - /bin/sh
            - -c
            - |
              DESIRED="quay.io/ckavili/fms-guardrails-orchestrator:race-fix"
              CURRENT=$(oc get configmap trustyai-service-operator-config \
                -n redhat-ods-applications \
                -o jsonpath='{.data.guardrails-orchestrator-image}' 2>/dev/null)

              if [ "$CURRENT" = "$DESIRED" ]; then
                echo "Image already set correctly. No action needed."
                exit 0
              fi

              echo "Current: $CURRENT"
              echo "Desired: $DESIRED"
              echo "Patching..."

              cat <<PATCH | oc apply --server-side --force-conflicts --field-manager=guardrails-patcher -f -
              apiVersion: v1
              kind: ConfigMap
              metadata:
                name: trustyai-service-operator-config
                namespace: redhat-ods-applications
              data:
                guardrails-orchestrator-image: "$DESIRED"
              PATCH

              FINAL=$(oc get configmap trustyai-service-operator-config \
                -n redhat-ods-applications \
                -o jsonpath='{.data.guardrails-orchestrator-image}')
              echo "Final: $FINAL"
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                cpu: 100m
                memory: 256Mi
