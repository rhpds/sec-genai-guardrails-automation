---
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: guardrails-detector-runtime-hap
  namespace: gaas
  annotations:
    helm.sh/weight: "0"
  labels:
    opendatahub.io/dashboard: 'true'
spec:
  annotations:
    prometheus.io/path: /metrics
    prometheus.io/port: '8080'
  containers:
    - args:
        - '--workers'
        - '4'
        - '--host'
        - 0.0.0.0
        - '--port'
        - '8000'
        - '--log-config'
        - /common/log_conf.yaml
      command:
        - uvicorn
        - 'app:app'
      env:
        - name: MODEL_DIR
          value: /mnt/models
        - name: HF_HOME
          value: /tmp/hf_home
        - name: KMP_AFFINITY
          value: "granularity=fine,compact,1,0"
        - name: KMP_BLOCKTIME
          value: "1"
        - name: OMP_NUM_THREADS
          value: "4"
        - name: DNNL_DEFAULT_FPMATH_MODE
          value: "BF16"
        - name: ONEDNN_MAX_CPU_ISA
          value: "AVX512_CORE_AMX"
      image: quay.io/trustyai/guardrails-detector-huggingface-runtime:v0.3.0
      name: kserve-container
      ports:
        - containerPort: 8000
          protocol: TCP
  multiModel: false
  supportedModelFormats:
    - autoSelect: true
      name: guardrails-detector-huggingface
---
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  annotations:
    helm.sh/weight: "1"
    openshift.io/display-name: guardrails-detector-ibm-hap
    serving.kserve.io/deploymentMode: RawDeployment
  name: guardrails-detector-ibm-hap
  namespace: gaas
  labels:
    opendatahub.io/dashboard: 'true'
spec:
  predictor:
    automountServiceAccountToken: false
    maxReplicas: 6
    minReplicas: 6
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node-role.kubernetes.io/worker
                  operator: Exists
                - key: node-role.kubernetes.io/control-plane
                  operator: DoesNotExist
                - key: feature.node.kubernetes.io/cpu-cpuid.AVX512VNNI
                  operator: In
                  values:
                    - "true"
    model:
      modelFormat:
        name: guardrails-detector-huggingface
      name: ''
      resources:
        limits:
          cpu: '8'
          memory: 24Gi
        requests:
          cpu: '4'
          memory: 16Gi
      runtime: guardrails-detector-runtime-hap
      storage:
        key: minio-data-connection-detector-models
        path: granite-guardian-hap-125m
